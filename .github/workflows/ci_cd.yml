name: CI/CD

on:
  push:
    branches:
      - "**"

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          # Ensure sqlite fallback in settings.py during CI
          POSTGRES_DB: ""
        run: |
          python manage.py test

  deploy:
    name: Deploy (server)
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu

            # Check if git_actions directory exists and is a git repo
            if [ -d "git_actions/.git" ]; then
              echo "Git repository exists, pulling changes..."
              cd git_actions
              git pull origin ${{ github.ref_name }}
            else
              echo "Cloning repository..."
              rm -rf git_actions
              git clone https://github.com/${{ github.repository }}.git git_actions
              cd git_actions
            fi

            # Stop old containers
            cd /home/ubuntu/git_actions
            docker-compose down || true

            # Build and start new containers
            docker-compose up -d --build

            # Wait for services to be ready
            sleep 15

            # Apply migrations
            docker-compose exec -T backend python manage.py migrate || true

            # Collect static files
            docker-compose exec -T backend python manage.py collectstatic --noinput || true

            # Clean up old Docker images
            docker image prune -f

            # Restart Nginx
            sudo systemctl restart nginx

            echo "Deployment completed successfully!"